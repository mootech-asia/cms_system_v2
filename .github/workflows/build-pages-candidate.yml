name: Build Pages candidate

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/build-pages-candidate.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-candidate
  cancel-in-progress: true

jobs:
  build-candidate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate GitHub Pages site
        working-directory: frontend
        env:
          NUXT_APP_BASE_URL: /cms_system_v2/
        run: npm run generate

      - name: Verify generated routes and base path
        working-directory: frontend/.output/public
        run: |
          set -euo pipefail
          test -f index.html
          test -f admin/index.html
          test -f studio/index.html
          test -f studio/preview/index.html
          grep -q '/cms_system_v2/' index.html
          if grep -Eq '(src|href)="/_nuxt/' index.html; then
            echo 'Found root-relative Nuxt asset path; refusing candidate.'
            exit 1
          fi
          touch .nojekyll
          cp index.html 404.html

      - name: Publish candidate branch
        working-directory: frontend/.output/public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git init
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "Pages candidate from ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:pages-candidate
